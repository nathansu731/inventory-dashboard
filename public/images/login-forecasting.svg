<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="1000" viewBox="0 0 1000 1000" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0F1B2D"/>
      <stop offset="55%" stop-color="#1B2F4A"/>
      <stop offset="100%" stop-color="#243A57"/>
    </linearGradient>
    <linearGradient id="chartLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#9AE6B4"/>
      <stop offset="100%" stop-color="#63B3ED"/>
    </linearGradient>
    <linearGradient id="chartFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#63B3ED" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#63B3ED" stop-opacity="0"/>
    </linearGradient>
    <pattern id="grid" width="56" height="56" patternUnits="userSpaceOnUse">
      <path d="M56 0H0V56" fill="none" stroke="#2E4764" stroke-width="1"/>
    </pattern>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#63B3ED" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#63B3ED" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1000" height="1000" fill="url(#bg)"/>
  <rect width="1000" height="1000" fill="url(#grid)" opacity="0.35"/>
  <circle cx="620" cy="400" r="340" fill="url(#glow)"/>

  <!-- ARK logo + wordmark -->
  <g stroke="#FFFFFF" stroke-width="11" fill="none">
    <path d="M448 168 L500 60 L552 168"/>
    <path d="M470 168 L508 88 L546 168 M482 140 L532 140"/>
  </g>
  <text x="500" y="205" text-anchor="middle" fill="#FFFFFF" font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="bold" letter-spacing="8">ARK FORECASTING</text>
  <text x="500" y="236" text-anchor="middle" fill="#8FB0D6" font-family="Arial, Helvetica, sans-serif" font-size="16" letter-spacing="3">SEE YOUR INVENTORY'S FUTURE</text>

  <!-- Dashboard screen -->
  <g>
    <rect x="330" y="280" width="560" height="400" rx="22" fill="#12253B" stroke="#2D4A6A" stroke-width="2"/>
    <rect x="330" y="280" width="560" height="46" rx="22" fill="#162C46"/>
    <circle cx="362" cy="303" r="7" fill="#E76A6A"/>
    <circle cx="386" cy="303" r="7" fill="#E7C86A"/>
    <circle cx="410" cy="303" r="7" fill="#7ED9A0"/>
    <text x="860" y="310" text-anchor="end" fill="#8FB0D6" font-family="Arial, Helvetica, sans-serif" font-size="16" letter-spacing="2">SKU DEMAND FORECAST</text>

    <!-- chart gridlines -->
    <g stroke="#22405F" stroke-width="1">
      <path d="M360 380 H860"/><path d="M360 440 H860"/><path d="M360 500 H860"/><path d="M360 560 H860"/><path d="M360 620 H860"/>
    </g>

    <!-- forecast cone -->
    <path d="M700 468 L860 350 L860 470 L700 476 Z" fill="#9AE6B4" opacity="0.10"/>
    <!-- history area -->
    <path d="M360 600 L440 570 L520 588 L600 520 L700 470 L700 640 L360 640 Z" fill="url(#chartFill)"/>
    <!-- history line -->
    <path d="M360 600 L440 570 L520 588 L600 520 L700 470" stroke="url(#chartLine)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- forecast line -->
    <path d="M700 470 L780 430 L860 386" stroke="#9AE6B4" stroke-width="6" stroke-linecap="round" stroke-dasharray="2 14"/>
    <g fill="#0F1B2D" stroke="#9AE6B4" stroke-width="4">
      <circle cx="440" cy="570" r="7"/><circle cx="520" cy="588" r="7"/><circle cx="600" cy="520" r="7"/><circle cx="700" cy="470" r="9"/>
    </g>
    <circle cx="700" cy="470" r="18" fill="none" stroke="#9AE6B4" stroke-width="2" opacity="0.5"/>
    <!-- today marker -->
    <path d="M700 350 V640" stroke="#3E5F84" stroke-width="2" stroke-dasharray="6 6"/>
    <rect x="668" y="330" width="64" height="26" rx="13" fill="#1C3652"/>
    <text x="700" y="348" text-anchor="middle" fill="#9AE6B4" font-family="Arial, Helvetica, sans-serif" font-size="14">TODAY</text>
  </g>

  <!-- stat chips -->
  <g font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="bold">
    <rect x="620" y="710" width="250" height="52" rx="26" fill="#13314A" stroke="#2D5A50" stroke-width="2"/>
    <circle cx="652" cy="736" r="12" fill="#1E4A3C"/>
    <path d="M646 736 L651 741 L659 730" stroke="#7ED9A0" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="674" y="743" fill="#9AE6B4">-32% stockouts</text>

    <rect x="620" y="780" width="250" height="52" rx="26" fill="#13314A" stroke="#2D4A6A" stroke-width="2"/>
    <path d="M640 812 L652 798 L662 806 L676 790" stroke="#63B3ED" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M676 790 L676 799 M676 790 L667 790" stroke="#63B3ED" stroke-width="3" stroke-linecap="round"/>
    <text x="690" y="813" fill="#8EC7F2">98% fill rate</text>
  </g>

  <!-- inventory boxes bottom right -->
  <g>
    <g transform="translate(880 830)">
      <path d="M0 0 L46 -22 L92 0 L46 22 Z" fill="#2A4467"/>
      <path d="M0 0 L46 22 L46 74 L0 52 Z" fill="#1D3350"/>
      <path d="M92 0 L46 22 L46 74 L92 52 Z" fill="#233C5E"/>
    </g>
    <g transform="translate(905 760)">
      <path d="M0 0 L36 -17 L72 0 L36 17 Z" fill="#2E4C72"/>
      <path d="M0 0 L36 17 L36 58 L0 41 Z" fill="#20385A"/>
      <path d="M72 0 L36 17 L36 58 L72 41 Z" fill="#274166"/>
    </g>
    <circle cx="905" cy="742" r="17" fill="#1E4A3C" stroke="#7ED9A0" stroke-width="2"/>
    <path d="M897 742 L903 748 L914 735" stroke="#7ED9A0" stroke-width="3.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- ground shadow -->
  <ellipse cx="205" cy="932" rx="130" ry="16" fill="#0A1524" opacity="0.6"/>

  <!-- Anime analyst character pointing at chart -->
  <g>
    <!-- hair back -->
    <path d="M200 438 C 148 440 134 486 138 528 C 141 566 150 596 140 630 C 156 622 166 612 172 598 L 232 598 C 240 614 250 624 264 630 C 254 594 260 562 262 526 C 266 484 252 440 200 438 Z" fill="#2E3A6E"/>
    <!-- neck -->
    <path d="M192 536 H210 V560 H192 Z" fill="#E9B98F"/>
    <!-- face -->
    <path d="M163 496 C 163 460 178 446 201 445 C 224 446 239 460 239 496 C 239 520 224 536 212 542 C 205 546 197 546 190 542 C 178 536 163 520 163 496 Z" fill="#F2C9A8"/>
    <!-- bangs -->
    <path d="M158 500 C 154 456 172 436 201 434 C 230 436 248 456 244 500 L 236 480 L 228 502 L 218 478 L 207 500 L 197 478 L 187 500 L 177 480 L 168 502 Z" fill="#3A4A85"/>
    <!-- eyes -->
    <g>
      <ellipse cx="185" cy="505" rx="8" ry="10" fill="#FFFFFF"/>
      <ellipse cx="217" cy="505" rx="8" ry="10" fill="#FFFFFF"/>
      <circle cx="186" cy="506" r="5" fill="#63B3ED"/>
      <circle cx="218" cy="506" r="5" fill="#63B3ED"/>
      <circle cx="186" cy="506" r="2.4" fill="#122036"/>
      <circle cx="218" cy="506" r="2.4" fill="#122036"/>
      <circle cx="188" cy="503" r="1.6" fill="#FFFFFF"/>
      <circle cx="220" cy="503" r="1.6" fill="#FFFFFF"/>
      <path d="M176 497 C 180 492 190 492 194 496" stroke="#232F55" stroke-width="3" stroke-linecap="round" fill="none"/>
      <path d="M208 496 C 212 492 222 492 226 497" stroke="#232F55" stroke-width="3" stroke-linecap="round" fill="none"/>
      <path d="M177 486 C 181 483 189 483 193 485" stroke="#2E3A6E" stroke-width="3" stroke-linecap="round" fill="none"/>
      <path d="M209 485 C 213 483 221 483 225 486" stroke="#2E3A6E" stroke-width="3" stroke-linecap="round" fill="none"/>
    </g>
    <!-- blush + mouth + nose -->
    <ellipse cx="176" cy="519" rx="6" ry="3" fill="#F19CB0" opacity="0.4"/>
    <ellipse cx="226" cy="519" rx="6" ry="3" fill="#F19CB0" opacity="0.4"/>
    <path d="M201 512 L 203 516" stroke="#D9A583" stroke-width="2" stroke-linecap="round"/>
    <path d="M194 525 Q 201 531 208 525" stroke="#B0684F" stroke-width="3" stroke-linecap="round" fill="none"/>

    <!-- torso blazer -->
    <path d="M201 556 L 156 572 C 138 580 132 606 130 646 L 136 756 L 266 756 L 272 646 C 270 606 264 580 246 572 Z" fill="#1E3E63"/>
    <!-- blouse -->
    <path d="M186 564 L 201 556 L 216 564 L 201 604 Z" fill="#E8EEF7"/>
    <path d="M201 604 L 190 640 L 201 700 L 212 640 Z" fill="#E8EEF7" opacity="0.9"/>
    <!-- lapels -->
    <path d="M186 564 L 201 604 L 178 596 Z" fill="#16304F"/>
    <path d="M216 564 L 201 604 L 224 596 Z" fill="#16304F"/>

    <!-- right arm pointing at chart -->
    <path d="M238 584 C 266 566 292 530 314 498 L 330 478 L 344 490 L 328 510 C 306 542 278 582 254 602 Z" fill="#1E3E63"/>
    <!-- hand pointing -->
    <g fill="#F2C9A8">
      <circle cx="340" cy="484" r="10"/>
      <path d="M344 476 L 362 458 L 369 465 L 351 483 Z"/>
    </g>

    <!-- left arm holding tablet -->
    <path d="M160 584 C 148 614 144 654 148 690 L 168 688 C 165 654 168 620 178 594 Z" fill="#1E3E63"/>
    <g transform="translate(128 682) rotate(-8)">
      <rect width="58" height="80" rx="8" fill="#12253B" stroke="#3E5F84" stroke-width="2.5"/>
      <path d="M10 58 L22 44 L32 50 L48 26" stroke="#9AE6B4" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M10 20 H36" stroke="#2D4A6A" stroke-width="3" stroke-linecap="round"/>
    </g>
    <circle cx="160" cy="692" r="9" fill="#F2C9A8"/>

    <!-- badge lanyard -->
    <path d="M190 566 L 201 620 L 212 566" stroke="#E7C86A" stroke-width="2.5" fill="none"/>
    <rect x="192" y="618" width="18" height="24" rx="3" fill="#E8EEF7" stroke="#C9B26A" stroke-width="1.5"/>

    <!-- skirt -->
    <path d="M136 756 L 128 812 L 274 812 L 266 756 Z" fill="#16304F"/>
    <!-- legs -->
    <path d="M154 812 L 148 916 L 176 916 L 186 812 Z" fill="#E9B98F"/>
    <path d="M216 812 L 226 916 L 254 916 L 248 812 Z" fill="#E9B98F"/>
    <!-- shoes -->
    <path d="M144 916 L 180 916 L 182 930 L 140 930 C 138 924 140 918 144 916 Z" fill="#1A2A45"/>
    <path d="M222 916 L 258 916 C 262 918 264 924 262 930 L 220 930 Z" fill="#1A2A45"/>
  </g>

  <!-- sparkles -->
  <g fill="#9AE6B4" opacity="0.8">
    <path d="M320 380 l4 10 10 4 -10 4 -4 10 -4 -10 -10 -4 10 -4 Z"/>
    <path d="M900 300 l3 8 8 3 -8 3 -3 8 -3 -8 -8 -3 8 -3 Z" fill="#63B3ED"/>
    <path d="M120 400 l3 8 8 3 -8 3 -3 8 -3 -8 -8 -3 8 -3 Z" fill="#63B3ED"/>
  </g>
</svg>
